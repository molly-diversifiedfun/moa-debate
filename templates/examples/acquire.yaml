debater_context: |
  This is an acquisition/M&A decision. The vast majority of acquisitions destroy
  value for the acquirer. Integration risk is routinely underestimated by 2-5x.
  The question isn't just "is this a good company?" but "can we make 1+1=3?"

judge_addendum: |
  Domain-specific evaluation for acquisition decisions:

  Evaluate on these criteria:
  - **Integration complexity**: How different are the tech stacks, cultures, and
    processes? Each major difference multiplies integration time by 1.5x.
  - **Retention risk**: Will the key people stay? If the value is in the team,
    model the cost of 40-60% departure within 18 months (industry average).
  - **Valuation sanity**: Is the price justified by DCF, comparable transactions,
    and strategic premium? Strategic premium >40% needs extraordinary justification.
  - **Build-vs-buy delta**: Could you build this capability in-house for less than
    50% of the acquisition price? If yes, why acquire?
  - **Culture compatibility**: Similar work style, decision-making speed, quality bar?
    Culture clashes kill more acquisitions than financial miscalculations.

  Decision tree should check:
  1. Is the primary value in the team, the product, or the customers? Answer changes everything.
  2. Can you retain 80%+ of key employees for 2+ years? If no, you're buying a depreciating asset.
  3. Does this fill a gap you can't build in 12-18 months? If you can build it, build it.

  De-risk steps must include:
  - Deep technical due diligence (not just financial) — read their code, talk to their engineers
  - Retention packages with 2-year cliffs for key personnel, agreed before close
  - 90-day integration plan written before signing, not after
  - Reference calls with 3+ customers to validate product stickiness

research_queries:
  - "acquisition integration best practices technology"
